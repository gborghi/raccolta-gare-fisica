<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" role="img" aria-label="Raccolta Gare di Fisica">
  <defs>
    <linearGradient id="rgfNucleus" x1="16" y1="16" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffd34e"/>
      <stop offset="1" stop-color="#ff7a2f"/>
    </linearGradient>
    <radialGradient id="rgfGlow" cx="24" cy="24" r="13" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffd34e" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffd34e" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- soft glow behind the atom -->
  <circle cx="24" cy="24" r="13" fill="url(#rgfGlow)"/>
  <!-- three electron orbits (transparent fill, light cream strokes) -->
  <g stroke-width="1.9" fill="none" stroke-linecap="round">
    <ellipse cx="24" cy="24" rx="20" ry="8.2" stroke="#fff6ec" stroke-opacity="0.95" transform="rotate(0 24 24)"/>
    <ellipse cx="24" cy="24" rx="20" ry="8.2" stroke="#5ad1c4" stroke-opacity="0.95" transform="rotate(60 24 24)"/>
    <ellipse cx="24" cy="24" rx="20" ry="8.2" stroke="#ff9a4d" stroke-opacity="0.95" transform="rotate(120 24 24)"/>
  </g>
  <!-- electrons on the orbits -->
  <circle cx="44" cy="24" r="2.1" fill="#fff6ec"/>
  <circle cx="14" cy="6.8" r="2.1" fill="#5ad1c4"/>
  <circle cx="14" cy="41.2" r="2.1" fill="#ff9a4d"/>
  <!-- nucleus: a competition spark / star at the heart of the atom -->
  <circle cx="24" cy="24" r="6.4" fill="url(#rgfNucleus)"/>
  <path d="M24 19.2l1.5 3.2 3.5.4-2.6 2.4.7 3.5-3.1-1.8-3.1 1.8.7-3.5-2.6-2.4 3.5-.4z" fill="#3a2596"/>
</svg>
